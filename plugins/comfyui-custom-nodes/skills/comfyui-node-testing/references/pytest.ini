[pytest]
testpaths = .
# To prevent top-level helper scripts in tests/ from polluting pytest runs,
# you can restrict test collection to specific subdirectories:
# python_files = unit/test_*.py integration/test_*.py
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short

markers =
    unit: Unit tests (fast, no server required)
    integration: Integration tests (requires ComfyUI server on port 8188)
